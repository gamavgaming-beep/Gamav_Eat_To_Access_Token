<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMAV CYBER UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background: radial-gradient(circle at top,#020617,#000);
    color:#0ff;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MAIN CARD */
.container{
    width:95%;
    max-width:1100px;
    padding:30px;
    border-radius:25px;
    background:rgba(0,0,0,0.7);
    border:1px solid rgba(0,255,255,0.2);
    box-shadow:0 0 50px #00f0ff20;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    font-size:26px;
    color:#0ff;
    text-shadow:0 0 10px #00f0ff;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    padding:12px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    background:transparent;
    border:1px solid #00f0ff40;
    transition:0.3s;
}

.tab:hover{
    background:#00f0ff10;
}

.tab.active{
    background:#00f0ff20;
    box-shadow:0 0 10px #00f0ff;
}

/* SECTIONS */
.section{
    display:none;
}

.section.active{
    display:block;
}

/* INPUT */
.input-box{
    position:relative;
    margin-top:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    background:transparent;
    border:1px solid #00f0ff40;
    border-radius:12px;
    color:#0ff;
    outline:none;
    font-size:14px;
}

.input-box label{
    position:absolute;
    top:-10px;
    left:10px;
    font-size:12px;
    background:black;
    padding:2px 8px;
    color:#00f0ff;
}

/* INPUT GLOW */
.input-box input:focus{
    border-color:#00f0ff;
    box-shadow:0 0 10px #00f0ff;
}

/* BUTTON */
.btn{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    background:linear-gradient(90deg,#00f0ff,#0077ff);
    color:black;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* BUTTON HOVER ANIMATION */
.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,#fff,transparent);
    transition:0.4s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    box-shadow:0 0 20px #00f0ff;
}

/* RESULT BOX */
.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    border:1px solid #00f0ff30;
    background:#001f2a;
}

/* LOGIN OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login{
    padding:30px;
    border:1px solid #00f0ff40;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px #00f0ff30;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="overlay">
    <div class="login">
        <h2>ACCESS CODE</h2>
        <input id="code" placeholder="Enter Code" class="btn" style="margin-top:15px;background:none;color:#0ff;border:1px solid #00f0ff;">
        <button class="btn" onclick="login()">ENTER</button>
        <p id="err" style="color:red;margin-top:10px;"></p>
    </div>
</div>

<!-- MAIN -->
<div class="container" id="main" style="display:none;">

    <div class="header">
        <h1>GAMAV CYBER ⚡</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="tab(1)">GET</div>
        <div class="tab" onclick="tab(2)">ACCESS</div>
        <div class="tab" onclick="tab(3)">DEV</div>
    </div>

    <!-- TAB 1 -->
    <div class="section active" id="t1">
        <button class="btn">LOGIN WITH GOOGLE</button>
    </div>

    <!-- TAB 2 -->
    <div class="section" id="t2">
        <div class="input-box">
            <label>EAT TOKEN</label>
            <input id="eat">
        </div>

        <button class="btn" onclick="convert()">CONVERT</button>

        <div class="result" id="res" style="display:none;">
            <p id="out"></p>
        </div>
    </div>

    <!-- TAB 3 -->
    <div class="section" id="t3">
        <p>Developer: GAMAV</p>
    </div>

</div>

<script>
function login(){
    let c=document.getElementById("code").value;
    if(c==="gamav"){
        overlay.style.display="none";
        main.style.display="block";
    }else{
        err.innerText="Wrong Code";
    }
}

function tab(n){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

    document.querySelectorAll(".tab")[n-1].classList.add("active");
    document.getElementById("t"+n).classList.add("active");
}

function convert(){
    let t=document.getElementById("eat").value;
    if(!t)return alert("Enter token");

    res.style.display="block";
    out.innerText="ACCESS_"+Math.random().toString(36).substr(2,12);
}
</script>

</body>
</html>
