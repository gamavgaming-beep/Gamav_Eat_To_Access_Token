<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMAV FF · TOKEN MANAGER</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a0f1f, #05070d 80%);
    color: #fff;
}

/* ===== OVERLAY ===== */
.code-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
}

.code-card {
    background: rgba(20,25,45,0.7);
    padding: 30px;
    border-radius: 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px #ff880066;
    border: 1px solid #ff8800aa;
    text-align: center;
}

.code-field {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: 2px solid #ff8800;
    background: #0f1424;
    color: white;
    text-align: center;
    font-size: 18px;
}

.code-btn {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(145deg,#ff9900,#ff5500);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: .2s;
}

.code-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff8800;
}

/* ===== MAIN CARD ===== */
.card {
    max-width: 1100px;
    margin: auto;
    margin-top: 30px;
    padding: 20px;
    border-radius: 30px;
    background: rgba(20,25,45,0.6);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px #ff880033;
    border: 1px solid rgba(255,140,0,0.2);
}

/* ===== HEADER ===== */
h1 {
    background: linear-gradient(90deg,#ff9900,#ff3c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ===== TABS ===== */
.tab-bar {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #1b2137;
    color: #aaa;
    cursor: pointer;
    transition: .3s;
}

.tab-btn:hover {
    background: #ff8800;
    color: black;
}

.tab-btn.active {
    background: linear-gradient(145deg,#ff9900,#ff5500);
    color: white;
    box-shadow: 0 0 20px #ff8800;
}

/* ===== SECTION ===== */
.section-card {
    background: rgba(30,36,60,0.6);
    padding: 20px;
    border-radius: 25px;
    border: 1px solid rgba(255,140,0,0.15);
}

/* ===== INPUT ===== */
.field {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: 2px solid #ff8800;
    background: #0f1424;
    color: white;
    margin-top: 10px;
}

.field:focus {
    box-shadow: 0 0 10px #ff8800;
}

/* ===== BUTTON ===== */
.btn-secondary {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(145deg,#ff9900,#ff5500);
    color: white;
    cursor: pointer;
    transition: .2s;
}

.btn-secondary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff8800;
}

/* ===== PLATFORM GRID ===== */
.platform-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap: 10px;
}

.platform-btn {
    background: #121728;
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    transition: .2s;
}

.platform-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #ff8800;
}

/* ===== RESULT ===== */
.result-box {
    margin-top: 15px;
    padding: 10px;
    background: #0f1424;
    border: 1px solid #ff8800;
    border-radius: 10px;
}

/* ===== TAB CONTENT ===== */
.tab-content {
    display: none;
    animation: fade .3s;
}

.tab-content.active {
    display: block;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="codeOverlay" class="code-overlay">
    <div class="code-card">
        <h2>ENTER CODE</h2>
        <input id="securityCode" class="code-field" placeholder="CODE">
        <button id="verifyBtn" class="code-btn">ENTER</button>
        <div id="codeError"></div>
    </div>
</div>

<!-- MAIN -->
<div id="mainContent" class="card">

<h1>GAMAV FF TOKEN MANAGER</h1>

<div class="tab-bar">
    <button class="tab-btn active" id="tab1">GET TOKEN</button>
    <button class="tab-btn" id="tab2">ACCESS</button>
    <button class="tab-btn" id="tab3">DEV</button>
</div>

<div id="tab1Content" class="tab-content active">
<div class="section-card">
<div class="platform-grid">
<a class="platform-btn">Google</a>
<a class="platform-btn">Facebook</a>
<a class="platform-btn">Twitter</a>
</div>
</div>
</div>

<div id="tab2Content" class="tab-content">
<div class="section-card">
<input class="field" placeholder="Enter Token">
<button class="btn-secondary">Convert</button>
</div>
</div>

<div id="tab3Content" class="tab-content">
<div class="section-card">
Developer Panel
</div>
</div>

</div>

<script>

/* SIMPLE UI LOGIC (UNCHANGED STYLE PURPOSE) */

const tabs = [
{btn:'tab1', content:'tab1Content'},
{btn:'tab2', content:'tab2Content'},
{btn:'tab3', content:'tab3Content'}
];

tabs.forEach(t=>{
document.getElementById(t.btn).onclick=()=>{
tabs.forEach(x=>{
document.getElementById(x.btn).classList.remove('active');
document.getElementById(x.content).classList.remove('active');
});
document.getElementById(t.btn).classList.add('active');
document.getElementById(t.content).classList.add('active');
}
});

document.getElementById('verifyBtn').onclick=()=>{
const code=document.getElementById('securityCode').value;
if(code==="1234"){
document.getElementById('codeOverlay').style.display="none";
document.getElementById('mainContent').style.display="block";
}else{
document.getElementById('codeError').innerText="Wrong Code";
}
}

</script>

</body>
</html>
