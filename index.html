<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMAV PRO TOKEN MANAGER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Glass Card */
.card{
    width:95%;
    max-width:1100px;
    padding:30px;
    border-radius:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    font-size:28px;
    font-weight:800;
    background:linear-gradient(90deg,#ff7a18,#ffb347);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Tabs */
.tabs{
    display:flex;
    gap:10px;
    margin:20px 0;
}

.tab{
    flex:1;
    padding:12px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}

.tab.active{
    background:linear-gradient(135deg,#ff7a18,#ff3d00);
    box-shadow:0 0 20px #ff6a00;
}

/* Content */
.section{
    display:none;
    animation:fadeIn 0.4s ease;
}

.section.active{
    display:block;
}

/* Input */
.input{
    width:100%;
    padding:15px;
    border-radius:20px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    margin-top:10px;
}

/* Button */
.btn{
    margin-top:15px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:20px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7a18,#ff3d00);
    color:white;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ff6a00;
}

/* Result Box */
.result{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(0,0,0,0.4);
}

/* Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-box{
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    text-align:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="overlay">
    <div class="login-box">
        <h2>ENTER ACCESS CODE</h2>
        <input id="code" class="input" placeholder="CODE">
        <button class="btn" onclick="login()">ENTER</button>
        <p id="error" style="color:red;margin-top:10px;"></p>
    </div>
</div>

<!-- MAIN -->
<div class="card" id="main" style="display:none;">
    
    <div class="header">
        <h1>GAMAV PRO ⚡</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(1)">GET TOKEN</div>
        <div class="tab" onclick="switchTab(2)">ACCESS</div>
        <div class="tab" onclick="switchTab(3)">DEV</div>
    </div>

    <!-- TAB 1 -->
    <div class="section active" id="tab1">
        <h3>GET TOKEN</h3>
        <button class="btn" onclick="alert('OAuth Redirect')">LOGIN WITH GOOGLE</button>
    </div>

    <!-- TAB 2 -->
    <div class="section" id="tab2">
        <h3>CONVERT TOKEN</h3>
        <input class="input" id="eat" placeholder="Enter EAT Token">
        <button class="btn" onclick="convert()">CONVERT</button>

        <div class="result" id="result" style="display:none;">
            <p id="token"></p>
        </div>
    </div>

    <!-- TAB 3 -->
    <div class="section" id="tab3">
        <h3>DEVELOPER</h3>
        <p>@GamavBot</p>
    </div>

</div>

<script>
function login(){
    let code = document.getElementById("code").value;

    if(code === "1234"){ // demo
        document.getElementById("overlay").style.display="none";
        document.getElementById("main").style.display="block";
    }else{
        document.getElementById("error").innerText="Invalid Code";
    }
}

function switchTab(n){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

    document.querySelectorAll(".tab")[n-1].classList.add("active");
    document.getElementById("tab"+n).classList.add("active");
}

function convert(){
    let token = document.getElementById("eat").value;

    if(!token){
        alert("Enter token");
        return;
    }

    document.getElementById("result").style.display="block";
    document.getElementById("token").innerText="ACCESS_"+Math.random().toString(36).substr(2,10);
}
</script>

</body>
</html>
